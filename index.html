<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="weather-app">

        <!-- Title -->

        <h1>🌤 Weather App</h1>

        <p class="subtitle">
            Get real-time weather information from anywhere in the world.
        </p>

        <!-- Search Area -->

        <div class="search-box">

            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name">

            <button id="searchBtn">
                Search
            </button>

            <button id="locationBtn" title="Use Current Location">
                📍
            </button>

        </div>

        <!-- Loading -->

        <div id="loading" class="loading">

            Loading weather...

        </div>

        <!-- Error -->

        <div id="error" class="error">

        </div>

        <!-- Search History -->

        <div id="historyContainer" class="history-container">

            <h3>Recent Searches</h3>

            <div id="history" class="history"></div>

        </div>

        <!-- Weather Card -->

        <div id="weatherCard" class="weather-card">

            <h2 id="city"></h2>

            <p id="dateTime"></p>

            <img
                id="icon"
                src=""
                alt="Weather Icon">

            <h1 id="temperature"></h1>

            <p id="description"></p>

            <div class="details">

                <div class="detail">

                    <span>🌍 Country</span>

                    <strong id="country"></strong>

                </div>

                <div class="detail">

                    <span>🌡 Feels Like</span>

                    <strong id="feelsLike"></strong>

                </div>

                <div class="detail">

                    <span>💧 Humidity</span>

                    <strong id="humidity"></strong>

                </div>

                <div class="detail">

                    <span>💨 Wind Speed</span>

                    <strong id="wind"></strong>

                </div>

                <div class="detail">

                    <span>🌬 Pressure</span>

                    <strong id="pressure"></strong>

                </div>

                <div class="detail">

                    <span>👀 Visibility</span>

                    <strong id="visibility"></strong>

                </div>

                <div class="detail">

                    <span>🌅 Sunrise</span>

                    <strong id="sunrise"></strong>

                </div>

                <div class="detail">

                    <span>🌇 Sunset</span>

                    <strong id="sunset"></strong>

                </div>

            </div>

            <p id="updated" class="updated"></p>

        </div>

    </div>

</div>

<footer>

    <p>

        Developed by <strong> Icon Dubaaha Daud LUBAABAH </strong>

    </p>

</footer>

<script src="script.js"></script>

</body>

</html>
